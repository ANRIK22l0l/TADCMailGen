<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Меню написания</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; width: 100%; max-width: 600px; text-align: center; }
        textarea { width: 100%; height: 350px; background: #2b2b2b; color: #fff; border: 1px solid #444; border-radius: 10px; padding: 12px; margin: 15px 0; font-size: 14px; line-height: 1.4; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #00d2ff; color: #000; font-size: 16px; margin-bottom: 10px; }
        .btn-copy { background: #333; color: #fff; }
        .btn-link { background: #ff4d4d; color: #fff; text-decoration: none; display: block; line-height: 50px; border-radius: 8px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Меню написания 🤡</h2>
        <button onclick="gen()">СГЕНЕРИРОВАТЬ ПИСЬМО</button>
        <textarea id="out" readonly placeholder="Нажми кнопку..."></textarea>
        <button class="btn-copy" onclick="cp()">СКОПИРОВАТЬ</button>
        <a href="https://kinoteatr.ru/feedback/" target="_blank" class="btn-link">САЙТ СИНЕМА ПАРК</a>
    </div>

    <script>
        function gen() {
            var starts = ["Здравствуйте!", "Добрый день!", "Приветствуем руководство КИНО МореМолл!"];
            var ends = ["Надеемся на положительное решение.", "Ждем вашего ответа.", "Будем рады обратной связи."];
            
            var s = starts[Math.floor(Math.random() * starts.length)];
            var e = ends[Math.floor(Math.random() * ends.length)];
            
            var body = "Обращаюсь к вам от лица инициативной группы зрителей г. Сочи. Мы ценим ваше внимание к громким анимационным премьерам и просим включить в расписание гранд-финал «Удивительного Цифрового Цирка» (4–7 июня 2026). Это самое ожидаемое событие года, фан-база координируется через канал: https://t.me/+wDP_MX3aQjM5M2Uy. Мы гарантируем высокую заполняемость залов. Если требуется формат аренды или коллективной заявки, просим сообщить условия. Для связи: violentionkosuko@gmail.com";
            
            document.getElementById("out").value = s + "\n\n" + body + "\n\n" + e + "\n\nС уважением,\nИнициативная группа зрителей г. Сочи";
        }
        function cp() {
            var t = document.getElementById("out");
            t.select();
            document.execCommand("copy");
            alert("Скопировано!");
        }
    </script>
</body>
</html>
