<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню написания</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px #000; }
        h2 { color: #00d2ff; margin-bottom: 15px; }
        textarea { width: 100%; height: 200px; background: #2b2b2b; color: #fff; border: 1px solid #444; border-radius: 10px; padding: 10px; margin: 15px 0; resize: none; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; background: #00d2ff; color: #000; font-size: 16px; }
        .btn-copy { background: #333; color: #fff; }
        .btn-red { background: #ff4d4d; color: #fff; text-decoration: none; display: block; line-height: 50px; border-radius: 8px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Меню написания 🤡</h2>
        <button onclick="generateText()">СГЕНЕРИРОВАТЬ ТЕКСТ</button>
        <textarea id="result" readonly placeholder="Нажми кнопку..."></textarea>
        <button class="btn-copy" onclick="copyResult()">СКОПИРОВАТЬ</button>
        <a href="https://kinoteatr.ru/feedback/" target="_blank" class="btn-red">САЙТ СИНЕМА ПАРК</a>
    </div>
    <script>
        function generateText() {
            var starts = ["Здравствуйте! Пишу от лица зрителей Сочи.", "Добрый день! Обращаюсь от фанатов из Сочи.", "Приветствую! Мы, группа зрителей Центрального района."];
            var middles = ["В июне 2026 состоится финал УЦЦ. Студия Glitch готова к прокату.", "4-7 июня 2026 - премьера 9 серии УЦЦ. Весь мир ставит её в расписание."];
            var ends = ["Просим добавить её в расписание КИНО МореМолл. Будет аншлаг!", "В Сочи у проекта 100% узнаваемость. Ждем релиз на ваших экранах!"];
            
            var s = starts[Math.floor(Math.random() * starts.length)];
            var m = middles[Math.floor(Math.random() * middles.length)];
            var e = ends[Math.floor(Math.random() * ends.length)];
            
            document.getElementById("result").value = s + "\n\n" + m + "\n\n" + e;
        }
        function copyResult() {
            var box = document.getElementById("result");
            box.select();
            document.execCommand("copy");
            alert("Скопировано!");
        }
    </script>
</body>
</html>
