<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Меню написания</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; width: 100%; max-width: 600px; text-align: center; }
        textarea { width: 100%; height: 400px; background: #2b2b2b; color: #fff; border: 1px solid #444; border-radius: 10px; padding: 12px; margin: 15px 0; font-size: 14px; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #00d2ff; font-weight: bold; cursor: pointer; }
        .btn-link { background: #ff4d4d; color: white; text-decoration: none; display: block; padding: 15px; border-radius: 8px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Меню написания</h2>
        <button onclick="showText()">ПОКАЗАТЬ ПИСЬМО</button>
        <textarea id="out" readonly></textarea>
        <button onclick="copyText()" style="background:#333; color:#fff; margin-top:10px;">СКОПИРОВАТЬ</button>
        <a href="https://kinoteatr.ru/feedback/" target="_blank" class="btn-link">САЙТ СИНЕМА ПАРК</a>
    </div>

    <script>
        // --- НЕИЗМЕНЯЕМЫЕ БЛОКИ (почта, ссылка на канал, главная мысль про УЦЦ) ---
        const EMAIL = "violentionkosuko@gmail.com";
        const CHANNEL_LINK = "https://t.me/+wDP_MX3aQjM5M2Uy";
        const TITLE_SHOW = "«Удивительный Цифровой Цирк» (The Amazing Digital Circus: Final Act)";
        const STUDIO = "Glitch Productions";
        const PREMIERE_DATES = "4–7 июня 2026 года";

        // --- ВАРИАНТЫ ДЛЯ ГЕНЕРАЦИИ УНИКАЛЬНЫХ ФРАЗ ---

        // Приветствия / вступления
        const GREETINGS = [
            "Здравствуйте!", "Добрый день!", "Уважаемая администрация!"
        ];

        // Обращения от лица группы
        const INTROS = [
            "Обращаюсь к вам от лица инициативной группы зрителей и фан-сообщества города Сочи.",
            "Пишу вам как представитель инициативной группы и фан-сообщества Сочи.",
            "От имени активных зрителей и фан-команды города Сочи хочу обратиться к вам."
        ];

        // Фразы про отслеживание репертуара
        const FOLLOW_REP = [
            "Мы внимательно следим за репертуаром кинотеатра «КИНО МореМолл» и ценим ваше внимание к громким анимационным премьерам.",
            "Мы регулярно изучаем афишу «КИНО МореМолл» и благодарны за интерес к крупным анимационным релизам.",
            "Нам импонирует ваш подход к анимационным премьерам — мы постоянно мониторим расписание «КИНО МореМолл»."
        ];

        // Основная просьба (вариации)
        const REQUESTS = [
            "В связи с этим просим вас рассмотреть возможность включения в расписание показа гранд-финала мирового хита " + TITLE_SHOW + " от студии " + STUDIO + ".",
            "Поэтому мы обращаемся с просьбой: добавить в график сеансов гранд-финал нашумевшего хита " + TITLE_SHOW + " (студия " + STUDIO + ").",
            "Именно поэтому мы хотели бы попросить вас организовать показ финальной части мирового бестселлера " + TITLE_SHOW + " производства " + STUDIO + "."
        ];

        // Заголовки для блока "почему это важно"
        const IMPORTANT_HEADERS = [
            "Почему это событие важно для вашего кинотеатра:", 
            "На что обратить внимание:", 
            "Ключевые аргументы в пользу показа:"
        ];

        // Варианты описания даты
        const DATE_VARIANTS = [
            "Дата мировой премьеры: " + PREMIERE_DATES + ".",
            "Мировая премьера запланирована на " + PREMIERE_DATES + ".",
            "Релиз состоится " + PREMIERE_DATES + "."
        ];

        // Варианты "огромный спрос"
        const DEMAND_VARIANTS = [
            "Огромный спрос: Данный проект — самое ожидаемое независимое анимационное событие года.",
            "Высочайший интерес: этот релиз — главная анимационная премьера года в независимом сегменте.",
            "Ажиотаж: проект уже признан самым ожидаемым независимым анимационным событием в этом году."
        ];

        // Варианты "готовая аудитория"
        const AUDIENCE_VARIANTS = [
            "Готовая аудитория: В Центральном районе Сочи уже сформировано активное сообщество, координирующееся через наш канал: " + CHANNEL_LINK + ". Мы готовы обеспечить высокую заполняемость залов и отличные показатели предзаказов.",
            "Целевая аудитория уже здесь: в Центральном районе Сочи есть активное фан-сообщество (наш канал: " + CHANNEL_LINK + "). Гарантируем хорошую заполняемость и высокий уровень предварительной продажи билетов.",
            "Платформа для продвижения: через наш канал " + CHANNEL_LINK + " в Центральном районе Сочи собрано активное сообщество. Мы можем обеспечить отличную посещаемость и предзаказы."
        ];

        // Варианты эксклюзивности
        const EXCLUSIVE_VARIANTS = [
            "Эксклюзивность: Показ финального эпизода на большом экране станет уникальным событием для городской молодежной культуры.",
            "Уникальность: возможность показать финал на большом экране — это яркое событие для всей молодёжной культуры города.",
            "Эксклюзивный характер: демонстрация заключительной серии в кинотеатре станет настоящим феноменом для сочинской молодёжи."
        ];

        // Информационная поддержка
        const SUPPORT_VARIANTS = [
            "Мы готовы оказать информационную поддержку и скоординировать зрителей для организованного выкупа билетов.",
            "Со своей стороны обещаем полное информационное сопровождение и координацию зрителей для коллективного выкупа билетов.",
            "Можем организовать информационную поддержку и скоординированный выкуп билетов среди зрителей."
        ];

        // Условия аренды
        const RENT_VARIANTS = [
            "Если для данного релиза требуется формат аренды зала или коллективной заявки, просим сообщить условия и актуальную стоимость.",
            "В случае если нужна аренда зала или коллективная заявка — напишите, пожалуйста, условия и стоимость.",
            "Если для показа потребуется аренда кинозала или оформление групповой заявки, сообщите нам детали и цену."
        ];

        // Фразы про обратную связь (почта неизменна)
        const FEEDBACK_VARIANTS = [
            "Для обратной связи и обсуждения деталей, пожалуйста, пишите на почту нашего главы: " + EMAIL,
            "По всем вопросам и для уточнения деталей обращайтесь на почту руководителя группы: " + EMAIL,
            "Ждём ваших предложений и комментариев на электронную почту нашего координатора: " + EMAIL
        ];

        // Надежды / итог
        const HOPE_VARIANTS = [
            "Надеемся на положительное решение и на то, что «КИНО МореМолл» станет главной площадкой для этого грандиозного финала в нашем городе.",
            "Рассчитываем на ваше согласие и верим, что именно «КИНО МореМолл» станет центральной площадкой для этого масштабного финала в Сочи.",
            "Будем благодарны за положительный ответ. Уверены, что «КИНО МореМолл» станет ключевым местом для этого грандиозного события в городе."
        ];

        // Прощания / подписи
        const SIGNATURES = [
            "С уважением,\nИнициативная группа зрителей г. Сочи",
            "С наилучшими пожеланиями,\nИнициативная группа г. Сочи",
            "С уважением и надеждой на сотрудничество,\nФан-сообщество и инициативная группа зрителей Сочи"
        ];

        // Случайный выбор элемента из массива
        function rand(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        // Формирование уникального письма
        function generateUniqueLetter() {
            let parts = [];

            // 1. Приветствие
            parts.push(rand(GREETINGS));
            parts.push(""); // пустая строка

            // 2. Представление от лица группы
            parts.push(rand(INTROS));
            parts.push("");

            // 3. Фраза про слежение за репертуаром
            parts.push(rand(FOLLOW_REP));
            parts.push("");

            // 4. Просьба (с УЦЦ и студией — неизменными внутри)
            parts.push(rand(REQUESTS));
            parts.push("");

            // 5. Заголовок блока аргументов
            parts.push(rand(IMPORTANT_HEADERS));

            // 6. Аргументы (перемешиваем порядок для уникальности)
            let arg1 = rand(DATE_VARIANTS);
            let arg2 = rand(DEMAND_VARIANTS);
            let arg3 = rand(AUDIENCE_VARIANTS);
            let arg4 = rand(EXCLUSIVE_VARIANTS);
            let args = [arg1, arg2, arg3, arg4];
            // случайная перестановка порядка аргументов
            for (let i = args.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [args[i], args[j]] = [args[j], args[i]];
            }
            for (let a of args) {
                parts.push(a);
            }
            parts.push("");

            // 7. Информационная поддержка
            parts.push(rand(SUPPORT_VARIANTS));
            parts.push("");

            // 8. Условия аренды
            parts.push(rand(RENT_VARIANTS));
            parts.push("");

            // 9. Почта для связи (неизменна)
            parts.push(rand(FEEDBACK_VARIANTS));
            parts.push("");

            // 10. Надежда / итог
            parts.push(rand(HOPE_VARIANTS));
            parts.push("");

            // 11. Подпись
            parts.push(rand(SIGNATURES));

            return parts.join("\n");
        }

        function showText() {
            let uniqueLetter = generateUniqueLetter();
            document.getElementById('out').value = uniqueLetter;
        }

        function copyText() {
            var el = document.getElementById('out');
            el.select();
            document.execCommand('copy');
            alert('Скопировано!');
        }
    </script>
</body>
</html>
