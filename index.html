<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Меню написания</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; width: 100%; max-width: 500px; text-align: center; box-shadow: 0 10px 30px #000; }
        h2 { color: #00d2ff; margin: 0 0 15px; }
        textarea { width: 100%; height: 250px; background: #2b2b2b; color: #fff; border: 1px solid #444; border-radius: 10px; padding: 12px; margin: 15px 0; resize: none; box-sizing: border-box; font-size: 14px; line-height: 1.5; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; background: #00d2ff; color: #000; }
        .btn-copy { background: #3d3d3d; color: #fff; margin-top: 10px; }
        .btn-link { background: #ff4d4d; color: white; text-decoration: none; display: block; line-height: 50px; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Меню написания 🤡</h2>
        <button onclick="generate()">СГЕНЕРИРОВАТЬ ПИСЬМО</button>
        <textarea id="output" readonly placeholder="Нажми кнопку..."></textarea>
        <button class="btn-copy" onclick="copyText()">СКОПИРОВАТЬ</button>
        <a href="https://kinoteatr.ru/feedback/" target="_blank" class="btn-link">САЙТ СИНЕМА ПАРК</a>
    </div>

    <script>
        function generate() {
            // Массив из 15 вариантов писем
            var variants = [
                "Здравствуйте! В июне 2026 года выходит финал УЦЦ. Очень ждем его в залах МореМолл!",
                "Добрый день! Просим организовать показы 9 серии УЦЦ в Сочи. Гарантируем аншлаг!",
                "Приветствуем! Фанаты УЦЦ из Центрального района Сочи просят добавить проект в расписание.",
                "Здравствуйте! 4-7 июня 2026 премьера УЦЦ. Мы очень хотим увидеть это на большом экране.",
                "Добрый день! Синема Парк, просим вас не игнорировать выход финала УЦЦ в июне 2026.",
                "Здравствуйте! УЦЦ — это хит. Сочи ждет 9 серию в июне 2026 года в МореМолле.",
                "Приветствую! Мы готовы выкупить целый зал на премьеру УЦЦ в начале июня 2026 года.",
                "Добрый день! Пожалуйста, добавьте УЦЦ в расписание показов в Сочи на июнь 2026.",
                "Здравствуйте! Весь Сочи следит за УЦЦ. Ждем финал в вашем кинотеатре 4-7 июня.",
                "Привет! УЦЦ от Glitch — это событие года. Просим прокат в Синема Парк МореМолл.",
                "Добрый день! Ждем старт предзаказов на финал УЦЦ (июнь 2026). Будут полные залы!",
                "Здравствуйте! Сочинские зрители просят включить 9 серию УЦЦ в летний репертуар.",
                "Приветствую! Синема Парк Сочи, обеспечьте нам премьеру УЦЦ в июне 2026!",
                "Добрый день! 4 июня 2026 выходит финал УЦЦ. Мы очень ждем сеансы в Центральном районе.",
                "Здравствуйте! Просим обратить внимание на успех УЦЦ и организовать показы в Сочи."
            ];

            // Твоя переменная, ответственная за выбор варианта (случайное число от 0 до 14)
            var choice = Math.floor(Math.random() * variants.length);
            
            // Вывод выбранного текста в окно
            document.getElementById("output").value = variants[choice];
        }

        function copyText() {
            var box = document.getElementById("output");
            if (box.value === "") return;
            box.select();
            document.execCommand("copy");
            alert("Текст скопирован!");
        }
    </script>
</body>
</html>
