<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Меню написания</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        textarea { width: 100%; height: 200px; background: #2b2b2b; color: #fff; border: 1px solid #444; border-radius: 10px; padding: 12px; margin: 15px 0; resize: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-gen { background: #00d2ff; color: #000; }
        .btn-copy { background: #333; color: #fff; }
        .btn-link { background: #ff4d4d; color: white; text-decoration: none; display: block; line-height: 50px; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Меню написания 🤡</h2>
        <button class="btn-gen" onclick="doGen()">ГЕНЕРИРОВАТЬ</button>
        <textarea id="out" readonly placeholder="Нажми кнопку..."></textarea>
        <button class="btn-copy" onclick="doCopy()">СКОПИРОВАТЬ</button>
        <a href="https://kinoteatr.ru/feedback/" target="_blank" class="btn-link">САЙТ СИНЕМА ПАРК</a>
    </div>

    <script>
        function doGen() {
            const g = ["Здравствуйте! Пишу вам от лица зрителей г. Сочи.", "Добрый день! Обращаюсь от имени фанатов из Сочи.", "Приветствую! Мы, группа кинозрителей Центрального района."];
            const m = ["В июне 2026 состоится финал «Удивительного Цифрового Цирка». Студия Glitch готова к прокату.", "4-7 июня 2026 - премьера 9 серии УЦЦ. Весь мир уже ставит её в расписание."];
            const e = ["Просим добавить её в расписание КИНО МореМолл. Гарантируем аншлаг!", "В Сочи у проекта 100% узнаваемость. Не упустите релиз года!"];

            const res = g[Math.floor(Math.random()*g.length)] + "\n\n" + 
                        m[Math.floor(Math.random()*m.length)] + "\n\n" + 
                        e[Math.floor(Math.random()*e.length)];
            
            document.getElementById("out").value = res;
        }

        function doCopy() {
            const t = document.getElementById("out");
            t.select();
            document.execCommand("copy");
            if(window.Telegram.WebApp.showAlert) window.Telegram.WebApp.showAlert("Скопировано!");
            else alert("Скопировано!");
        }
    </script>
</body>
</html>
