<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню написания</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px #000; }
        h2 { color: #00d2ff; }
        textarea { width: 100%; height: 200px; background: #2b2b2b; color: #fff; border: 1px solid #444; border-radius: 10px; padding: 10px; margin: 15px 0; resize: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; background: #00d2ff; color: #000; }
        .btn-copy { background: #333; color: #fff; }
        .btn-red { background: #ff4d4d; color: #fff; text-decoration: none; display: block; line-height: 50px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Меню написания 🤡</h2>
        <button onclick="gen()">СГЕНЕРИРОВАТЬ ТЕКСТ</button>
        <textarea id="box" readonly placeholder="Тут будет текст..."></textarea>
        <button class="btn-copy" onclick="cp()">СКОПИРОВАТЬ</button>
        <a href="https://kinoteatr.ru/feedback/" target="_blank" class="btn-red">САЙТ СИНЕМА ПАРК</a>
    </div>
    <script>
        function gen() {
            var a = ["Здравствуйте!", "Добрый день!", "Приветствую!"];
            var b = ["В июне 2026 выйдет финал УЦЦ в МореМолл.", "Просим добавить 9 серию УЦЦ в прокат Сочи."];
            var c = ["Гарантируем аншлаг!", "Ждем предзаказ билетов."];
            var res = a[Math.floor(Math.random()*a.length)] + "\n\n" + b[Math.floor(Math.random()*b.length)] + "\n\n" + c[Math.floor(Math.random()*c.length)];
            document.getElementById("box").value = res;
        }
        function cp() {
            var t = document.getElementById("box");
            t.select();
            document.execCommand("copy");
            alert("Скопировано!");
        }
    </script>
</body>
</html>
