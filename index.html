<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Меню написания</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; width: 100%; max-width: 600px; text-align: center; }
        textarea { width: 100%; height: 400px; background: #2b2b2b; color: #fff; border: 1px solid #444; border-radius: 10px; padding: 12px; margin: 15px 0; font-size: 14px; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #00d2ff; font-weight: bold; cursor: pointer; }
        .btn-link { background: #ff4d4d; color: white; text-decoration: none; display: block; padding: 15px; border-radius: 8px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Меню написания</h2>
        <button onclick="showText()">ПОКАЗАТЬ ПИСЬМО</button>
        <textarea id="out" readonly></textarea>
        <button onclick="copyText()" style="background:#333; color:#fff; margin-top:10px;">СКОПИРОВАТЬ</button>
        <a href="https://kinoteatr.ru/feedback/" target="_blank" class="btn-link">САЙТ СИНЕМА ПАРК</a>
    </div>

    <script>
        // НЕИЗМЕНЯЕМЫЕ ДАННЫЕ
        const EMAIL = "violentionkosuko@gmail.com";
        const CHANNEL = "https://t.me/+wDP_MX3aQjM5M2Uy";
        const SHOW = "«Удивительный Цифровой Цирк» (The Amazing Digital Circus: Final Act)";
        const STUDIO = "Glitch Productions";
        const DATE = "4–7 июня 2026 года";

        // БОЛЬШОЙ НАБОР УНИКАЛЬНЫХ ФРАЗ (каждый раз выбираются случайные)
        const GREET = ["Здравствуйте!", "Добрый день!", "Уважаемая администрация!", "Здравствуйте, уважаемые сотрудники!"];
        const WHO = [
            "Обращаюсь к вам от лица инициативной группы зрителей и фан-сообщества города Сочи.",
            "Пишет вам представитель инициативной группы и фан-сообщества Сочи.",
            "От имени активных зрителей и фанатов города Сочи обращается наша группа.",
            "Я — член инициативной группы зрителей Сочи, и мы все вас очень ценим."
        ];
        const FOLLOW = [
            "Мы внимательно следим за репертуаром «КИНО МореМолл» и благодарны за ваше внимание к анимационным премьерам.",
            "Мы регулярно смотрим афишу вашего кинотеатра и рады, что вы поддерживаете крупные анимационные релизы.",
            "Нам нравится ваш подход к анимации — мы мониторим расписание «КИНО МореМолл» постоянно."
        ];
        const ASK = [
            `Поэтому просим вас рассмотреть возможность показа гранд-финала ${SHOW} от ${STUDIO}.`,
            `Мы хотели бы попросить добавить в расписание финал мирового хита ${SHOW} (студия ${STUDIO}).`,
            `Очень надеемся, что вы включите в сеансы заключительную часть ${SHOW} от ${STUDIO}.`
        ];
        const HEAD = ["Почему это важно:", "Аргументы за показ:", "Обратите внимание:", "Ключевые причины:"];
        const D = [`Дата премьеры: ${DATE}.`, `Мировой релиз: ${DATE}.`, `Премьера состоится ${DATE}.`];
        const DEM = [
            "Огромный спрос — это самое ожидаемое независимое анимационное событие года.",
            "Высочайший интерес: главная анимационная премьера года в независимом кино.",
            "Ажиотаж невероятный — все ждут именно этот финал."
        ];
        const AUD = [
            `Готовая аудитория: в Центральном районе Сочи активное сообщество (наш канал: ${CHANNEL}). Обеспечим высокую заполняемость.`,
            `У нас есть канал ${CHANNEL} — там уже собраны все фанаты. Гарантируем аншлаг и хорошие предзаказы.`,
            `Через ${CHANNEL} координируется активное сообщество. Мы готовы организовать толпу зрителей.`
        ];
        const EXC = [
            "Эксклюзивность: показ финала на большом экране станет событием для молодёжи города.",
            "Уникальность: такой показ — редкость для Сочи, это привлечёт внимание.",
            "Это будет первое событие такого рода — молодёжь оценит."
        ];
        const SUP = [
            "Мы поможем с информационной поддержкой и координацией выкупа билетов.",
            "Организуем репосты и скоординируем зрителей для предзаказа.",
            "Гарантируем информационную поддержку и поможем с заполняемостью зала."
        ];
        const RENT = [
            "Если нужна аренда зала или коллективная заявка — сообщите условия и стоимость.",
            "При необходимости аренды или групповой заявки — напишите, пожалуйста, цену и формат.",
            "Для аренды или коллективного бронирования ждём ваших условий."
        ];
        const FEED = [
            `Для связи пишите на почту главы группы: ${EMAIL}`,
            `Обратная связь: ${EMAIL}`,
            `Ждём вашего ответа на ${EMAIL}`
        ];
        const HOPE = [
            "Надеемся на положительное решение и что «КИНО МореМолл» станет главной площадкой финала в Сочи.",
            "Верим, что вы согласитесь, и именно ваш кинотеатр примет этот грандиозный финал.",
            "Рассчитываем на ваше согласие — пусть «КИНО МореМолл» станет центром события."
        ];
        const SIGN = [
            "С уважением,\nИнициативная группа зрителей г. Сочи",
            "С надеждой на сотрудничество,\nФан-сообщество Сочи",
            "С благодарностью,\nИнициативная группа г. Сочи"
        ];

        function rand(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function shuffleBlocks(blocks) {
            for (let i = blocks.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [blocks[i], blocks[j]] = [blocks[j], blocks[i]];
            }
            return blocks;
        }

        function generateLetter() {
            // Блоки, которые могут менять порядок
            let mainBlocks = [
                rand(GREET),
                rand(WHO),
                rand(FOLLOW),
                rand(ASK)
            ];

            // Блок аргументов (4 пункта, но в разном порядке)
            let args = [rand(D), rand(DEM), rand(AUD), rand(EXC)];
            args = shuffleBlocks([...args]);
            let header = rand(HEAD);
            let argsBlock = header + "\n" + args.join("\n");

            let supportBlock = rand(SUP);
            let rentBlock = rand(RENT);
            let feedbackBlock = rand(FEED);
            let hopeBlock = rand(HOPE);
            let signBlock = rand(SIGN);

            // Собираем всё вместе
            let all = [...mainBlocks, argsBlock, supportBlock, rentBlock, feedbackBlock, hopeBlock, signBlock];

            // Дополнительная уникализация: иногда меняем местами support и rent
            if (Math.random() > 0.5) {
                let idx1 = all.indexOf(supportBlock);
                let idx2 = all.indexOf(rentBlock);
                if (idx1 !== -1 && idx2 !== -1) {
                    [all[idx1], all[idx2]] = [all[idx2], all[idx1]];
                }
            }

            // Иногда добавляем пустую строку в случайных местах для разнообразия
            let result = [];
            for (let i = 0; i < all.length; i++) {
                result.push(all[i]);
                if (Math.random() > 0.7 && i !== all.length - 1) {
                    result.push("");
                }
            }

            return result.join("\n\n");
        }

        function showText() {
            document.getElementById('out').value = generateLetter();
        }

        function copyText() {
            let el = document.getElementById('out');
            el.select();
            document.execCommand('copy');
            alert('Скопировано!');
        }
    </script>
</body>
</html>
