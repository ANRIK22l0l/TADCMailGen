<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню написания</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #00d2ff; margin: 0 0 15px 0; font-size: 22px; }
        textarea { width: 100%; height: 200px; background: #2b2b2b; color: #fff; border: 1px solid #444; border-radius: 10px; padding: 12px; margin: 15px 0; resize: none; box-sizing: border-box; font-size: 14px; line-height: 1.5; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 10px; transition: 0.2s; }
        .btn-gen { background: #00d2ff; color: #000; }
        .btn-copy { background: #3d3d3d; color: #fff; }
        .btn-link { background: #ff4d4d; color: white; text-decoration: none; display: block; line-height: 50px; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <h2>Меню написания 🤡</h2>
        <button class="btn-gen" onclick="generate()">СГЕНЕРИРОВАТЬ ТЕКСТ</button>
        <textarea id="output" readonly placeholder="Нажми кнопку выше..."></textarea>
        <button class="btn-copy" onclick="copyText()">СКОПИРОВАТЬ</button>
        <a href="https://kinoteatr.ru/feedback/" target="_blank" class="btn-link">ОСТАВИТЬ ОТЗЫВ</a>
    </div>

    <script>

        if (tg) { tg.expand(); }

            var i2 = Math.floor(Math.random() * m.length);
            var i3 = Math.floor(Math.random() * e.length);

            // Сборка текста через обычный плюс, чтобы не было ошибок отображения
            var finalResult = g[i1] + "\n\n" + m[i2] + "\n\n" + e[i3];
            
            document.getElementById("output").value = finalResult;
        }
