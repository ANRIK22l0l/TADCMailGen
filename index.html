        // Вспомогательная функция случайного выбора

        // Перемешивание массива (для порядка аргументов)
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }

        // Генерация уникального письма
        function generateLetter() {
            // Собираем основные блоки в порядке, который потом перемешаем

            let argDate = rand(DATE_VARIANTS);
            let argDemand = rand(DEMAND_VARIANTS);
            let argAudience = rand(AUDIENCE_VARIANTS);
            let argExclusive = rand(EXCLUSIVE_VARIANTS);
            let argsList = [argDate, argDemand, argAudience, argExclusive];
            argsList = shuffle(argsList);
            let argsBlock = header + "\n" + argsList.join("\n");
            blocks.push(argsBlock);

            // Информационная поддержка
            blocks.push(rand(SUPPORT_VARIANTS));
            // Аренда
            blocks.push(rand(RENT_VARIANTS));
            // Обратная связь
            blocks.push(rand(FEEDBACK_VARIANTS));
            // Надежда
            blocks.push(rand(HOPE_VARIANTS));
            // Подпись
            blocks.push(rand(SIGNATURES));

            // Перемешиваем порядок блоков (но приветствие и подпись лучше не трогать? 
            // Можно перемешать все, кроме первого и последнего? Для разнообразия перемешаем все, но оставим приветствие первым? 
            // Но можно и приветствие оставить первым, а подпись последней. Сделаем так: фиксируем приветствие и подпись, остальное перемешиваем)
            let first = blocks[0];        // приветствие
            let last = blocks[blocks.length - 1]; // подпись
            let middle = blocks.slice(1, -1);
            middle = shuffle(middle);
            let finalBlocks = [first, ...middle, last];

            // Случайно добавляем пустые строки между блоками (для разнообразия)
            let result = [];
            for (let i = 0; i < finalBlocks.length; i++) {
                result.push(finalBlocks[i]);
                if (i !== finalBlocks.length - 1 && Math.random() > 0.6) {
                    result.push(""); // пустая строка
                }
            }

            return result.join("\n\n");
        }
