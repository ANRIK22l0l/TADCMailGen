<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Меню написания</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        textarea { width: 100%; height: 200px; background: #2b2b2b; color: #fff; border: 1px solid #444; border-radius: 10px; padding: 10px; margin: 15px 0; resize: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #00d2ff; color: #000; }
        .btn-copy { background: #333; color: #fff; margin-top: 10px; }
        .btn-link { background: #ff4d4d; color: #fff; text-decoration: none; display: block; line-height: 50px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Меню написания 🤡</h2>
        <button onclick="generate()">СГЕНЕРИРОВАТЬ</button>
        <textarea id="output" readonly placeholder="Нажми кнопку..."></textarea>
        <button class="btn-copy" onclick="copy()">КОПИРОВАТЬ</button>
        <a href="https://kinoteatr.ru/feedback/" target="_blank" class="btn-link">САЙТ СИНЕМА ПАРК</a>
    </div>
    <script>
        function generate() {
            var g = ["Здравствуйте!", "Добрый день!", "Приветствую!"];
            var m = ["В июне 2026 финал УЦЦ выйдет в прокат. Ждем его в Сочи!", "Просим добавить 9 серию УЦЦ в расписание КИНО МореМолл."];
            var e = ["Гарантируем полные залы!", "Весь Сочи ждет этот релиз!"];
            
            var text = g[Math.floor(Math.random()*g.length)] + "\n\n" + 
                       m[Math.floor(Math.random()*m.length)] + "\n\n" + 
                       e[Math.floor(Math.random()*e.length)];
            
            document.getElementById("output").value = text;
        }
        function copy() {
            var target = document.getElementById("output");
            target.select();
            document.execCommand("copy");
            alert("Скопировано!");
        }
    </script>
</body>
</html>
