<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCC GEN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #00d2ff; margin-bottom: 20px; }
        textarea { width: 100%; height: 180px; background: #2b2b2b; color: #fff; border: 1px solid #444; border-radius: 10px; padding: 12px; margin: 15px 0; resize: none; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 10px; transition: 0.2s; }
        .btn-gen { background: #00d2ff; color: #000; }
        .btn-copy { background: #333; color: #fff; }
        .btn-link { background: #ff4d4d; color: white; text-decoration: none; display: block; line-height: 50px; border-radius: 8px; font-weight: bold; }
        button:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="card">
        <h2>ГЕНЕРАТОР УЦЦ 🤡</h2>
        <button class="btn-gen" onclick="generate()">СГЕНЕРИРОВАТЬ</button>
        <textarea id="output" readonly placeholder="Нажми кнопку выше..."></textarea>
        <button class="btn-copy" onclick="copy()">КОПИРОВАТЬ</button>
        <a href="https://kinoteatr.ru/feedback/" target="_blank" class="btn-link">САЙТ СИНЕМА ПАРК</a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const g = ["Здравствуйте!", "Приветствую!", "Добрый день!"];
        const m = ["4-7 июня 2026 состоится финал УЦЦ. Студия Glitch готова к прокату.", "В июне 2026 выходит 9 серия УЦЦ. Просим включить её в расписание."];
        const e = ["Гарантируем полные залы в МореМолл!", "В Сочи у проекта огромная фан-база. Ждем премьеру!"];

        function generate() {
            const text = g[Math.floor(Math.random()*g.length)] + "\n\n" + m[Math.floor(Math.random()*m.length)] + "\n\n" + e[Math.floor(Math.random()*e.length)];
            document.getElementById("output").value = text;
        }

        function copy() {
            const area = document.getElementById("output");
            if (!area.value) return;
            area.select();
            document.execCommand("copy");
            if(tg.showAlert) tg.showAlert("Скопировано!"); else alert("Скопировано!");
        }
    </script>
</body>
</html>
