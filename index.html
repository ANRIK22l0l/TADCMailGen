<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Меню написания</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; text-align: center; }
        textarea { width: 100%; height: 250px; background: #2b2b2b; color: #fff; border: 1px solid #444; border-radius: 10px; padding: 12px; margin: 15px 0; font-size: 14px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #00d2ff; color: #000; font-size: 16px; }
        .btn-cp { background: #333; color: #fff; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Меню написания 🤡</h2>
        <button onclick="f()">СГЕНЕРИРОВАТЬ</button>
        <textarea id="t" readonly></textarea>
        <button class="btn-cp" onclick="c()">СКОПИРОВАТЬ</button>
    </div>
    <script>
        function f() {
            var s = "Здравствуйте! Мы, зрители Центрального района Сочи, просим вас добавить 9 серию УЦЦ в расписание КИНО МореМолл. В Сочи у проекта огромная фан-база, узнаваемость почти 100%. Мы гарантируем полную заполняемость залов и высокий спрос на билеты. Не упустите главный анимационный релиз года!";
            document.getElementById("t").value = s;
        }
        function c() {
            var b = document.getElementById("t");
            b.select();
            document.execCommand("copy");
            alert("Готово!");
        }
    </script>
</body>
</html>
